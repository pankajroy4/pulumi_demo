# ======================================================================================

name: CI-CD

on:
  push:
    branches:
      - main2


jobs:

# =========================================================
# 1️⃣ CI - Run backend tests
# =========================================================
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd apps/python-fast-api
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd apps/python-fast-api
          pytest


# =========================================================
# 2️⃣ Build backend container
# =========================================================
  build-backend:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-backend:latest apps/python-fast-api

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-backend:latest


# =========================================================
# 3️⃣ Deploy Infrastructure via Pulumi
# =========================================================
  deploy-infra:
    needs: build-backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Pulumi dependencies
        run: |
          cd infra
          npm install

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Pulumi Login
        run: pulumi login
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Select stack
        run: pulumi stack select production --non-interactive
        working-directory: infra

      - name: Deploy infra
        run: pulumi up --yes --non-interactive --parallel 1
        working-directory: infra


# =========================================================
# 4️⃣ Build React Frontend
# =========================================================
  build-frontend:
    needs: deploy-infra
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Pulumi dependencies
        run: |
          cd infra
          npm install

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Pulumi Login
        run: pulumi login
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Select stack
        run: pulumi stack select production --non-interactive
        working-directory: infra

      - name: Get API URL
        id: api
        run: |
          API_URL=$(cd infra && pulumi stack output apiUrl)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Install frontend dependencies
        run: |
          cd apps/react-frontend
          npm install

      - name: Build React
        run: |
          cd apps/react-frontend
          echo "VITE_API_BASE_URL=${{ steps.api.outputs.api_url }}" > .env.production
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: apps/react-frontend/dist


# =========================================================
# 5️⃣ Deploy React to Static Web Apps
# =========================================================
  deploy-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Pulumi dependencies
        run: |
          cd infra
          npm install

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Pulumi Login
        run: pulumi login
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Select stack
        run: pulumi stack select production --non-interactive
        working-directory: infra

      - name: Download React build
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: apps/react-frontend/dist

      - name: Get Static Web App token
        id: swa
        run: |
          TOKEN=$(cd infra && pulumi stack output staticWebAppToken)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "apps/react-frontend"
          output_location: "dist"