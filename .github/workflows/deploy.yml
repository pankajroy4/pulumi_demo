name: CI-CD

on:
  push:
    branches:
      - Deploy_with_Docker_using_ci_cd

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/fastapi-backend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ------------ Backend Tests -------------------------
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd apps/python-fast-api
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd apps/python-fast-api
          pytest

  # ------------ Build & Push Docker Image -------------------------
  build-backend:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t $DOCKER_IMAGE:$IMAGE_TAG \
            apps/python-fast-api

      - name: Push image
        run: |
          docker push $DOCKER_IMAGE:$IMAGE_TAG

  # ------------ Deploy Infrastructure (Pulumi) -------------------------
  deploy-infra:
    needs: build-backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: infra/package-lock.json

      - uses: pulumi/setup-pulumi@v2

      - name: Install infra dependencies
        run: |
          cd infra
          npm install

      - name: Pulumi Login
        run: pulumi login
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Select stack
        run: pulumi stack select production --non-interactive
        working-directory: infra

      - name: Set backend image
        run: |
          pulumi config set backendImage $DOCKER_IMAGE:$IMAGE_TAG
        working-directory: infra

      - name: Deploy infrastructure
        run: pulumi up --yes --non-interactive
        working-directory: infra

  # ------------ Build React Frontend -------------------------
  build-frontend:
    needs: deploy-infra
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/react-frontend/package-lock.json

      - uses: pulumi/setup-pulumi@v2

      - name: Install infra dependencies
        run: |
          cd infra
          npm install

      - name: Pulumi Login
        run: pulumi login
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Select stack
        run: pulumi stack select production --non-interactive
        working-directory: infra

      - name: Get API URL
        id: api
        run: |
          API_URL=$(cd infra && pulumi stack output apiUrl)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Install frontend dependencies
        run: |
          cd apps/react-frontend
          npm install

      - name: Create production env
        run: |
          cd apps/react-frontend
          echo "VITE_API_URL=${{ steps.api.outputs.api_url }}" > .env.production

      - name: Build React
        run: |
          cd apps/react-frontend
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: apps/react-frontend/dist

  # ------------ Deploy React to Static Web Apps -------------------------
  deploy-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pulumi/setup-pulumi@v2

      - name: Install infra dependencies
        run: |
          cd infra
          npm install

      - name: Pulumi Login
        run: pulumi login
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Select stack
        run: pulumi stack select production --non-interactive
        working-directory: infra

      - uses: actions/download-artifact@v4
        with:
          name: react-build
          path: apps/react-frontend/dist

      - name: Get Static Web App token
        id: swa
        run: |
          TOKEN=$(cd infra && pulumi stack output staticWebAppToken)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "apps/react-frontend/dist"
          skip_app_build: true