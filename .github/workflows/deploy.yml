name: CI-CD

on:
  push:
    branches:
      - Deploy_with_ACR_using_ci_cd

env:
  IMAGE_NAME: fastapi-backend
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ---------------------------------------------------
  # Backend Tests
  # ---------------------------------------------------
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/python-fast-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest


  # ---------------------------------------------------
  # Build + Push Docker Image
  # ---------------------------------------------------
  build-backend:
    needs: test-backend
    runs-on: ubuntu-latest

    outputs:
      login_server: ${{ steps.acr.outputs.login_server }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pulumi/setup-pulumi@v2

      - name: Install infra dependencies
        run: npm install
        working-directory: infra

      - name: Pulumi Login
        run: pulumi login
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Select stack
        run: pulumi stack select production --non-interactive
        working-directory: infra

      - name: Get ACR login server
        id: acr
        run: |
          LOGIN_SERVER=$(pulumi stack output acrLoginServer)
          echo "login_server=$LOGIN_SERVER" >> $GITHUB_OUTPUT
        working-directory: infra

      - name: Login to ACR
        run: |
          az acr login --name $(echo ${{ steps.acr.outputs.login_server }} | cut -d'.' -f1)

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ steps.acr.outputs.login_server }}/${IMAGE_NAME}:${IMAGE_TAG} \
            apps/python-fast-api

      - name: Push Docker Image
        run: |
          docker push \
            ${{ steps.acr.outputs.login_server }}/${IMAGE_NAME}:${IMAGE_TAG}


  # ---------------------------------------------------
  # Deploy Infrastructure
  # ---------------------------------------------------
  deploy-infra:
    needs: build-backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pulumi/setup-pulumi@v2

      - name: Install infra dependencies
        run: npm install
        working-directory: infra

      - name: Pulumi Login
        run: pulumi login
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Select stack
        run: pulumi stack select production --non-interactive
        working-directory: infra

      - name: Set backend image
        run: |
          pulumi config set backendImage \
          ${{ needs.build-backend.outputs.login_server }}/${IMAGE_NAME}:${IMAGE_TAG}
        working-directory: infra

      - name: Deploy infrastructure
        run: pulumi up --yes --non-interactive
        working-directory: infra


  # ---------------------------------------------------
  # Build Frontend
  # ---------------------------------------------------
  build-frontend:
    needs: deploy-infra
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/react-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pulumi/setup-pulumi@v2

      - name: Install infra dependencies
        run: npm install
        working-directory: infra

      - name: Pulumi Login
        run: pulumi login
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Select stack
        run: pulumi stack select production --non-interactive
        working-directory: infra

      - name: Get API URL
        id: api
        run: |
          API_URL=$(pulumi stack output apiUrl)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
        working-directory: infra

      - name: Install frontend dependencies
        run: npm install

      - name: Create production env
        run: |
          echo "VITE_API_URL=${{ steps.api.outputs.api_url }}" > .env.production

      - name: Build React
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: apps/react-frontend/dist


  # ---------------------------------------------------
  # Deploy Frontend
  # ---------------------------------------------------
  deploy-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pulumi/setup-pulumi@v2

      - name: Install infra dependencies
        run: npm install
        working-directory: infra

      - name: Pulumi Login
        run: pulumi login
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Select stack
        run: pulumi stack select production --non-interactive
        working-directory: infra

      - uses: actions/download-artifact@v4
        with:
          name: react-build
          path: apps/react-frontend/dist

      - name: Get Static Web App token
        id: swa
        run: |
          TOKEN=$(pulumi stack output staticWebAppToken)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
        working-directory: infra

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "apps/react-frontend/dist"
          skip_app_build: true